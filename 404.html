<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page not found — GloSkin</title>
  <meta name="description" content="The page you were looking for could not be found." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --purple-600: #7C3AED; --purple-500: #8B5CF6; --purple-400: #A78BFA;
      --purple-100: #EDE9FE; --purple-50: #F5F3FF; --lavender: #DDD6FE;
      --white: #FFFFFF; --gray-500: #6B7280; --gray-700: #374151; --gray-900: #111827;
    }
    body {
      font-family: 'Nunito', sans-serif;
      background: linear-gradient(160deg, var(--purple-50) 0%, var(--white) 50%, var(--lavender) 100%);
      color: var(--gray-900);
      min-height: 100vh;
      display: flex; flex-direction: column;
      line-height: 1.6;
    }
    nav {
      padding: 0 24px; height: 64px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .nav-logo {
      font-size: 1.4rem; font-weight: 900;
      background: linear-gradient(135deg, var(--purple-600), var(--purple-400));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; text-decoration: none;
    }
    .nav-links { display: flex; gap: 28px; list-style: none; }
    .nav-links a { color: var(--gray-700); text-decoration: none; font-size: 0.95rem; font-weight: 600; transition: color 0.2s; }
    .nav-links a:hover { color: var(--purple-600); }

    main {
      flex: 1;
      display: flex; align-items: center; justify-content: center;
      padding: 60px 24px;
      text-align: center;
    }
    .inner { max-width: 520px; }
    .code {
      font-size: clamp(4rem, 14vw, 7rem); font-weight: 900;
      background: linear-gradient(135deg, var(--purple-600), var(--purple-400));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1; letter-spacing: -0.04em;
      margin-bottom: 16px;
    }
    h1 {
      font-size: clamp(1.6rem, 3.5vw, 2.2rem); font-weight: 900;
      letter-spacing: -0.02em; margin-bottom: 14px;
    }
    p { color: var(--gray-500); font-size: 1.02rem; font-weight: 500; margin-bottom: 32px; }
    .btn-primary {
      display: inline-flex; align-items: center; gap: 10px;
      background: linear-gradient(135deg, var(--purple-600), var(--purple-500));
      color: var(--white); padding: 14px 28px; border-radius: 14px;
      text-decoration: none; font-size: 1rem; font-weight: 800;
      box-shadow: 0 8px 24px rgba(124,58,237,0.32);
      transition: transform 0.18s, box-shadow 0.18s;
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 12px 32px rgba(124,58,237,0.40); }

    footer {
      background: var(--gray-900); color: rgba(255,255,255,0.6);
      padding: 32px 24px; text-align: center;
    }
    .footer-links-row { display: flex; gap: 24px; justify-content: center; flex-wrap: wrap; margin-bottom: 12px; }
    .footer-links-row a { color: rgba(255,255,255,0.55); text-decoration: none; font-size: 0.9rem; font-weight: 500; transition: color 0.2s; }
    .footer-links-row a:hover { color: var(--white); }
    footer p { color: rgba(255,255,255,0.55); font-size: 0.85rem; font-weight: 500; margin: 0; }

    @media (max-width: 600px) { .nav-links { display: none; } }
  </style>
</head>
<body>

<nav>
  <a class="nav-logo" href="index.html">GloSkin</a>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="privacy.html">Privacy</a></li>
    <li><a href="terms.html">Terms</a></li>
    <li><a href="support.html">Support</a></li>
  </ul>
</nav>

<main>
  <div class="inner">
    <div class="code">404</div>
    <h1>Page not found</h1>
    <p>The page you were looking for doesn't exist or may have moved.</p>
    <a class="btn-primary" href="index.html">Back to home</a>
  </div>
</main>

<footer>
  <div class="footer-links-row">
    <a href="index.html">Home</a>
    <a href="privacy.html">Privacy Policy</a>
    <a href="terms.html">Terms of Service</a>
    <a href="support.html">Support</a>
  </div>
  <p>&copy; 2026 GloSkin. All rights reserved.</p>
</footer>

</body>
</html>
